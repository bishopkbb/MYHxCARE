name: CD — Staging

on:
  # Push trigger is disabled until DOCR, web-01, and SSH credentials are
  # configured as GitHub repo secrets. Enable it then by adding:
  #   push:
  #     branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-staging
  cancel-in-progress: false

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: registry.digitalocean.com/myhxcare/frontend

jobs:
  deploy:
    name: Build image + deploy to web-01
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      # Build and push Docker image to DigitalOcean Container Registry.
      # NEXT_PUBLIC_* vars are build args — they're inlined by Turbopack into
      # the client bundle and cannot be overridden at container runtime.
      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCR_TOKEN }}
          password: ${{ secrets.DOCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.STAGING_API_BASE_URL }}
            NEXT_PUBLIC_WS_URL=${{ vars.STAGING_WS_URL }}
            NEXT_PUBLIC_APP_ENV=staging
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      # Pull the new image on web-01 and restart the container.
      # Requires a deploy user with Docker socket access and a running nginx
      # reverse proxy that forwards port 80 → 3000.
      - name: Deploy to web-01
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: deploy
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop myhxcare-frontend || true
            docker rm myhxcare-frontend || true
            docker run -d \
              --name myhxcare-frontend \
              --restart unless-stopped \
              -p 3000:3000 \
              --network myhxcare \
              ${{ env.IMAGE_NAME }}:latest
            docker image prune -f
