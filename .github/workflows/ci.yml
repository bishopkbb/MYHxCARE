name: Frontend CI and Development Image

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: hms-frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: myhxcare/hms-frontend

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    if: github.repository == 'MYHxCARE/HMS-Frontend'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

  build:
    name: Build
    if: github.repository == 'MYHxCARE/HMS-Frontend'
    runs-on: ubuntu-latest

    needs:
      - quality

    env:
      CI: 'true'

      # These mock values are used only to verify that the application builds.
      # The published development image also uses mock data and receives no
      # real API or WebSocket endpoints.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
      NEXT_PUBLIC_APP_ENV: development

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Confirm standalone output
        shell: bash
        run: |
          test -f .next/standalone/server.js
          test -d .next/static

          echo "Next.js standalone output is present."

  publish:
    name: Publish development image
    runs-on: ubuntu-latest

    needs:
      - build

    outputs:
      FRONTEND_IMAGE_REF: ${{ steps.publish.outputs.image_ref }}
      digest: ${{ steps.publish.outputs.digest }}

    # Only publish from the official repository's main branch.
    # Pull requests and manual runs from feature branches cannot overwrite
    # the shared dev image tag.
    if: >
      github.repository == 'MYHxCARE/HMS-Frontend' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch')

    permissions:
      contents: read
      packages: write

    # Development is the only published frontend mode while the
    # frontend/backend contracts are still being integrated.
    env:
      DEV_APP_ENV: development

    # TODO(staging/production): Do not add real-environment publishing until:
    # - staff login, refresh, logout and /me API contracts are implemented;
    # - frontend API payloads and WebSocket events match the backend;
    # - environment-specific HTTPS/WSS repository variables are configured;
    # - integration/E2E checks run against each real environment; and
    # - staging and production use separate immutable release manifests.

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate development build variables
        shell: bash
        run: |
          : "${DEV_APP_ENV:?DEV_APP_ENV is not configured}"

          if [[ "$DEV_APP_ENV" != "development" ]]; then
            echo "Only development frontend images may be published right now."
            exit 1
          fi

          echo "Development build variables are valid."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          tags: |
            type=raw,value=dev
            type=raw,value=sha-${{ github.sha }}

          labels: |
            org.opencontainers.image.title=MYHxCare HMS Frontend
            org.opencontainers.image.description=MYHxCare Next.js hospital management interface
            org.opencontainers.image.source=https://github.com/MYHxCARE/HMS-Frontend
            org.opencontainers.image.vendor=MYHxCare

      - name: Build and load image
        id: build-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false

          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

          build-args: |
            NEXT_PUBLIC_APP_ENV=${{ env.DEV_APP_ENV }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify production runtime
        shell: bash
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
        run: |
          docker run \
            --rm \
            --entrypoint sh \
            "$IMAGE_REF" \
            -eu -c '
              command -v node
              node --version
              test -f /app/server.js

              if command -v npm >/dev/null 2>&1 ||
                 command -v npx >/dev/null 2>&1 ||
                 test -e /usr/local/lib/node_modules/npm; then
                echo "FAIL: npm build tooling remains in the production image." >&2
                exit 1
              fi

              echo "PASS: standalone runtime is present and npm/npx are absent."
            '

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish validated image
        id: publish
        shell: bash
        env:
          IMAGE_REPOSITORY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IMMUTABLE_IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          DEV_IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
        run: |
          docker push "$IMMUTABLE_IMAGE_REF"
          docker push "$DEV_IMAGE_REF"

          digest="$(
            docker buildx imagetools inspect "$IMMUTABLE_IMAGE_REF" |
              awk '$1 == "Digest:" { print $2; exit }'
          )"

          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Unable to resolve the published image digest." >&2
            exit 1
          fi

          image_ref="${IMAGE_REPOSITORY}@${digest}"

          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"

      - name: Show published image details
        shell: bash
        env:
          FRONTEND_IMAGE_REF: ${{ steps.publish.outputs.image_ref }}
        run: |
          echo "Published development tag:"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev"
          echo
          echo "Published immutable tag:"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          echo
          echo "FRONTEND_IMAGE_REF=$FRONTEND_IMAGE_REF"

  dispatch-development-deployment:
    name: Dispatch frontend development deployment

    needs:
      - publish

    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.publish.result == 'success'

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Create deployment-dispatch token
        id: release-app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.MYHXCARE_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.MYHXCARE_RELEASE_APP_PRIVATE_KEY }}
          owner: MYHxCARE
          repositories: deployment
          permission-contents: write

      - name: Validate published digest
        env:
          DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          set -Eeuo pipefail

          if [[ ! "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "Invalid frontend image digest: ${DIGEST}" >&2
            exit 1
          fi

          echo "Frontend image digest is valid."

      - name: Notify deployment repository
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
          DIGEST: ${{ needs.publish.outputs.digest }}
          IMAGE: ghcr.io/myhxcare/hms-frontend
        run: |
          set -Eeuo pipefail

          published_at="$(
            date -u +%FT%TZ
          )"

          source_run_url="$(
            printf '%s/%s/actions/runs/%s' \
              "$GITHUB_SERVER_URL" \
              "$GITHUB_REPOSITORY" \
              "$GITHUB_RUN_ID"
          )"

          jq -n \
            --arg service "frontend" \
            --arg environment "development" \
            --arg source_repository "$GITHUB_REPOSITORY" \
            --arg source_commit "$GITHUB_SHA" \
            --arg source_ref "$GITHUB_REF_NAME" \
            --arg source_run_url "$source_run_url" \
            --arg image "$IMAGE" \
            --arg digest "$DIGEST" \
            --arg published_at "$published_at" \
            '{
              event_type: "application-image-published",
              client_payload: {
                service: $service,
                environment: $environment,
                source_repository: $source_repository,
                source_commit: $source_commit,
                source_ref: $source_ref,
                source_run_url: $source_run_url,
                image: $image,
                digest: $digest,
                published_at: $published_at
              }
            }' \
            > "$RUNNER_TEMP/deployment-dispatch.json"

          gh api \
            --method POST \
            "/repos/MYHxCARE/deployment/dispatches" \
            --input "$RUNNER_TEMP/deployment-dispatch.json"

          echo "Frontend deployment dispatch accepted."
