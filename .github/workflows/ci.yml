name: Frontend CI and Demo Image

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: hms-frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: myhxcare/hms-frontend

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    if: github.repository == 'MYHxCARE/HMS-Frontend'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

  build:
    name: Build
    if: github.repository == 'MYHxCARE/HMS-Frontend'
    runs-on: ubuntu-latest

    needs:
      - quality

    env:
      CI: 'true'

      # These mock values are used only to verify that the application builds.
      # The published Docker image is also demo-only and receives no real
      # API or WebSocket endpoints.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
      NEXT_PUBLIC_APP_ENV: development

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Confirm standalone output
        shell: bash
        run: |
          test -f .next/standalone/server.js
          test -d .next/static

          echo "Next.js standalone output is present."

  publish:
    name: Publish demo image
    runs-on: ubuntu-latest

    needs:
      - build

    # Only publish from the official repository's main branch.
    # Pull requests and manual runs from feature branches cannot overwrite
    # the shared dev image tag.
    if: >
      github.repository == 'MYHxCARE/HMS-Frontend' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch')

    permissions:
      contents: read
      packages: write

    # Demo is the only deployable frontend mode while the frontend/backend
    # contracts are still being integrated.
    env:
      DEV_APP_ENV: demo

    # TODO(staging/production): Do not add non-demo publishing until:
    # - staff login, refresh, logout and /me API contracts are implemented;
    # - frontend API payloads and WebSocket events match the backend;
    # - environment-specific HTTPS/WSS repository variables are configured;
    # - integration/E2E checks run against each real environment; and
    # - staging and production use separate immutable release manifests.

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate demo build variables
        shell: bash
        run: |
          : "${DEV_APP_ENV:?DEV_APP_ENV is not configured}"

          if [[ "$DEV_APP_ENV" != "demo" ]]; then
            echo "Only demo frontend images may be published right now."
            exit 1
          fi

          echo "Demo build variables are valid."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          tags: |
            type=raw,value=dev
            type=raw,value=demo
            type=sha,prefix=sha-,format=short

          labels: |
            org.opencontainers.image.title=MYHxCare HMS Frontend
            org.opencontainers.image.description=MYHxCare Next.js hospital management interface
            org.opencontainers.image.source=https://github.com/MYHxCARE/HMS-Frontend
            org.opencontainers.image.vendor=MYHxCare

      - name: Build and publish image
        id: docker-build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true

          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

          build-args: |
            NEXT_PUBLIC_APP_ENV=${{ env.DEV_APP_ENV }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show published image details
        shell: bash
        run: |
          echo "Published image:"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          echo
          echo "Published digest:"
          echo "${{ steps.docker-build.outputs.digest }}"
